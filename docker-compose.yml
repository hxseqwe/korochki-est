version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: korochki-db
    environment:
      POSTGRES_DB: korochki_est
      POSTGRES_USER: korochki_user
      POSTGRES_PASSWORD: korochki_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U korochki_user -d korochki_est"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: korochki-app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://korochki_user:korochki_password@postgres:5432/korochki_est?sslmode=disable
      SESSION_KEY: super-secret-key-change-in-production
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/root/migrations

volumes:
  postgres_data: